services:
  postgres:
    image: postgres:16-alpine
    container_name: watchparty-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=watchParty
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    
  redis: 
    image: redis:7-alpine
    container_name: watchparty-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend: 
    build:
      context: .
      dockerfile: Dockerfile
    container_name: watchparty-backend
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      # Magia de Docker: Sobreescribimos 'localhost' de tu .env por los nombres de los contenedores
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/watchParty
      - REDIS_URL=redis://redis:6379
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data:
  redis_data: