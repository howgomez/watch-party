name: Client CI

on:
  push:
    branches: [ master ]
    paths:
      - 'client/**'
      - '.github/workflows/client-ci.yml'
  pull_request:
    branches: [ master ]
    paths:
      - 'client/**'

jobs:
  build-and-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./client

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: './client/pnpm-lock.yaml'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm run lint
        continue-on-error: true # Opcional: para que no bloquee el build si hay warnings o fallos de estilo

      - name: Run Type Check
        # En Next.js, puedes hacer un check de TypeScript si está configurado en un script
        run: pnpm tsc --noEmit || echo "No tsc command available or failing"
        continue-on-error: true

      - name: Build Next.js
        run: pnpm run build
