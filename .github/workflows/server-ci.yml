name: Server CI

on:
  push:
    branches: [ master ]
    paths:
      - 'server/**'
      - '.github/workflows/server-ci.yml'
  pull_request:
    branches: [ master ]
    paths:
      - 'server/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./server

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: './server/pnpm-lock.yaml'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Start services (Postgres & Redis)
        run: docker compose up -d

      - name: Wait for services to be ready
        run: sleep 5 # Ajusta el tiempo si postgres tarda más en arrancar

      - name: Generate Prisma Client
        run: pnpm exec prisma generate
        
      - name: Run ESLint
        run: pnpm run lint
        continue-on-error: true # Cambia esto si quieres que el CI falle por errores de linting

      - name: Build server
        run: pnpm run build

      - name: Run Tests
        run: pnpm run test

      - name: Run E2E Tests
        run: pnpm run test:e2e
        continue-on-error: true

      - name: Stop services
        if: always()
        run: docker compose down

  # --- NUEVA FASE DE DEPLOYMENT (CD) ---
  deploy:
    # Solo ejecuta este trabajo si el anterior (build-and-test) fue exitoso
    needs: build-and-test
    # Solo despliega si estamos en la rama master
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Production Server
        uses: appleboy/ssh-action@master
        with:
          # Estas son variables secretas que configuraremos en GitHub
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # Entramos a la carpeta de tu proyecto en el VPS
            cd /home/usuario/watch-party/server
            
            # Descargamos los últimos cambios de GitHub
            git pull origin master
            
            # Reconstruimos la imagen y encendemos todo sin apagar el servidor
            docker compose up -d --build
